<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Price Delta Analysis: Me vs Sharky</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-primary: #0d1117; --bg-card: #161b22; --bg-header: #1c2333;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #484f58;
            --accent-me: #58a6ff; --accent-sharky: #f0883e;
            --positive: #3fb950; --negative: #f85149;
            --gap: 16px; --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
        .container { max-width: 1500px; margin: 0 auto; padding: var(--gap); }
        a { color: var(--accent-me); text-decoration: none; }

        .header { background: var(--bg-header); border: 1px solid var(--border); padding: 20px 24px; border-radius: var(--radius); margin-bottom: var(--gap); }
        .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--accent-me), var(--accent-sharky)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .nav-links { margin-top: 8px; font-size: 12px; }
        .nav-links a { margin-right: 16px; }

        .loading { text-align: center; padding: 80px 20px; }
        .loading h2 { font-size: 18px; margin-bottom: 16px; }
        .progress-wrap { width: 400px; max-width: 90%; margin: 0 auto 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; height: 22px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-me), var(--accent-sharky)); transition: width 0.3s; width: 0%; border-radius: 8px; }
        .log { max-width: 500px; margin: 0 auto; text-align: left; font-family: monospace; font-size: 12px; color: var(--text-secondary); max-height: 200px; overflow-y: auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .log-ok { color: var(--positive); } .log-err { color: var(--negative); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: var(--gap); }
        .card h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .card-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--gap); margin-bottom: var(--gap); }
        .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
        .kpi-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
        .kpi-val { font-size: 24px; font-weight: 700; }
        .kpi-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: var(--gap); margin-bottom: var(--gap); }
        .chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
        .chart-box h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
        .chart-box canvas { max-height: 320px; }
        .full-w { grid-column: 1 / -1; }

        .verdict-box { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
        .verdict-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .verdict-body { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

        .side-by-side { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-bottom: var(--gap); }
        .trader-box { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
        .trader-box h5 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .stat-line { font-size: 13px; color: var(--text-secondary); margin-bottom: 3px; }
        .stat-val { color: var(--text-primary); font-weight: 600; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead th { text-align: left; padding: 8px; border-bottom: 2px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; cursor: pointer; }
        thead th:hover { color: var(--text-primary); }
        tbody td { padding: 7px 8px; border-bottom: 1px solid rgba(48,54,61,0.5); white-space: nowrap; }
        tbody tr:hover { background: rgba(88,166,255,0.04); }
        .tag-me { background: rgba(88,166,255,0.15); color: var(--accent-me); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .tag-sh { background: rgba(240,136,62,0.15); color: var(--accent-sharky); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .td-market { white-space: normal; min-width: 250px; max-width: 380px; word-wrap: break-word; }

        .filter-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-bar label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .filter-bar select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); font-size: 12px; }

        .footer { text-align: center; padding: 16px; font-size: 12px; color: var(--text-muted); }
        @media (max-width: 768px) { .chart-row, .side-by-side { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>Price Delta Analysis: Entry Price vs Strike</h1>
        <div class="header-sub">Does Sharky have a minimum profit threshold before entering? What prices does he target?</div>
        <div class="nav-links">
            <a href="dashboard.html">← Main Dashboard</a>
            <a href="timing_analysis.html">Timing Analysis</a>
        </div>
    </header>

    <div id="loading" class="loading">
        <h2 id="load-title">Fetching all trades from Polymarket API...</h2>
        <div class="progress-wrap"><div class="progress-fill" id="pbar"></div></div>
        <div class="log" id="logbox"></div>
    </div>

    <div id="results" style="display:none;"></div>
    <footer class="footer">Data fetched: <span id="fetch-date">—</span></footer>
</div>

<script>
const WALLETS = {
    "Sharky": "0x751a2b86cab503496efd325c8344e10159349ea1",
    "Me": "0xfaf310af70a9a9fa1a43225db317260a2a84f1bc"
};
const API = "https://data-api.polymarket.com";
const PROXIES = [
    { prefix: "", encode: false },
    { prefix: "https://corsproxy.io/?", encode: false },
    { prefix: "https://api.allorigins.win/raw?url=", encode: true },
    { prefix: "https://api.codetabs.com/v1/proxy?quest=", encode: false },
];
let wp = null;

function log(m, c='') { const el=document.getElementById('logbox'); const d=document.createElement('div'); d.className=c; d.textContent=m; el.appendChild(d); el.scrollTop=el.scrollHeight; }
function prog(p) { document.getElementById('pbar').style.width=p+'%'; }

async function fetchP(url) {
    if (wp !== null) { const r=await fetch(PROXIES[wp].prefix?(PROXIES[wp].prefix+(PROXIES[wp].encode?encodeURIComponent(url):url)):url); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }
    for (let i=0;i<PROXIES.length;i++) {
        try { const p=PROXIES[i]; const r=await fetch(p.prefix?(p.prefix+(p.encode?encodeURIComponent(url):url)):url); if(!r.ok) continue; const t=await r.text(); let d; try{d=JSON.parse(t);}catch(e){continue;} wp=i; log(p.prefix?`Connected via ${p.prefix.split('/')[2]}`:'Connected directly','log-ok'); return d;
        } catch(e) { continue; }
    }
    throw new Error('All fetch methods failed. Use: python -m http.server 8000');
}

async function fetchAll(label, addr) {
    let all=[], off=0;
    log(`Fetching ${label} (${addr.substring(0,10)}...)...`);
    while(true) {
        const p=new URLSearchParams({user:addr,type:'TRADE',limit:500,offset:off,sortBy:'TIMESTAMP',sortDirection:'DESC'});
        try { const b=await fetchP(`${API}/activity?${p}`); if(!b||!Array.isArray(b)||!b.length) break; all=all.concat(b); log(`  ${label}: ${all.length} trades`,'log-ok'); if(b.length<500) break; off+=500; await new Promise(r=>setTimeout(r,300));
        } catch(e) { log(`  ERROR: ${e.message}`,'log-err'); break; }
    }
    return all;
}

// ════════ HELPERS ════════
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function med(a){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function pct(count,total){return total?((count/total)*100).toFixed(1):0;}
function fmtUSD(v){if(v>=1e6)return`$${(v/1e6).toFixed(1)}M`;if(v>=1e3)return`$${(v/1e3).toFixed(1)}K`;return`$${v.toFixed(0)}`;}

// ════════ ANALYSIS ════════

function buildAnalysis(allTrades) {
    const trades = allTrades.map(t => {
        const price = parseFloat(t.price) || 0;
        const side = (t.side || '').toUpperCase();
        const outcome = (t.outcome || '').toUpperCase();
        const usdc = parseFloat(t.usdcSize) || 0;
        const size = parseFloat(t.size) || 0;
        const ts = t.timestamp || 0;
        const dt = ts ? new Date(ts * 1000) : null;
        const pad = n => String(n).padStart(2,'0');
        const localDt = dt ? `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}` : '';

        // "Price" from API = price per share the trader paid
        // If buying YES at $0.95, potential profit = $1.00 - $0.95 = $0.05 per share (5.3%)
        // If buying NO at $0.40, potential profit = $1.00 - $0.40 = $0.60 per share (150%)
        // "Delta to strike" = $1.00 - entry price = potential profit per share if correct
        const deltaToStrike = 1.0 - price; // how far from $1.00 (the payout)
        const deltaPct = price > 0 ? (deltaToStrike / price) * 100 : 0; // ROI % if correct
        const impliedProb = price; // entry price = implied probability

        return {
            wallet: t._wallet,
            timestamp: ts,
            datetime: localDt,
            title: t.title || '',
            slug: t.slug || '',
            eventSlug: t.eventSlug || '',
            side, outcome, price, usdc, size,
            deltaToStrike,
            deltaPct,
            impliedProb,
            txHash: t.transactionHash || ''
        };
    }).filter(t => t.timestamp > 0 && t.price > 0 && t.price < 1);

    const shTrades = trades.filter(t => t.wallet === 'Sharky');
    const meTrades = trades.filter(t => t.wallet === 'Me');

    // Find shared markets (same slug)
    const shSlugs = new Set(shTrades.map(t => t.slug));
    const meSlugs = new Set(meTrades.map(t => t.slug));
    const sharedSlugs = new Set([...shSlugs].filter(s => meSlugs.has(s)));

    const el = document.getElementById('results');
    let html = '';

    // ═══ KPIs ═══
    const shPrices = shTrades.map(t => t.price);
    const mePrices = meTrades.map(t => t.price);
    const shDeltas = shTrades.map(t => t.deltaPct);
    const meDeltas = meTrades.map(t => t.deltaPct);

    html += `<div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Sharky Trades</div><div class="kpi-val" style="color:var(--accent-sharky)">${shTrades.length}</div><div class="kpi-detail">${sharedSlugs.size} shared markets</div></div>
        <div class="kpi"><div class="kpi-label">Your Trades</div><div class="kpi-val" style="color:var(--accent-me)">${meTrades.length}</div><div class="kpi-detail">${meSlugs.size} unique markets</div></div>
        <div class="kpi"><div class="kpi-label">Sharky Median Price</div><div class="kpi-val" style="color:var(--accent-sharky)">$${med(shPrices).toFixed(3)}</div><div class="kpi-detail">Avg: $${avg(shPrices).toFixed(3)}</div></div>
        <div class="kpi"><div class="kpi-label">Your Median Price</div><div class="kpi-val" style="color:var(--accent-me)">$${med(mePrices).toFixed(3)}</div><div class="kpi-detail">Avg: $${avg(mePrices).toFixed(3)}</div></div>
        <div class="kpi"><div class="kpi-label">Sharky Median ROI%</div><div class="kpi-val" style="color:var(--accent-sharky)">${med(shDeltas).toFixed(1)}%</div><div class="kpi-detail">If correct: profit per $ risked</div></div>
        <div class="kpi"><div class="kpi-label">Your Median ROI%</div><div class="kpi-val" style="color:var(--accent-me)">${med(meDeltas).toFixed(1)}%</div><div class="kpi-detail">If correct: profit per $ risked</div></div>
    </div>`;

    // ═══ PRICE DISTRIBUTION HISTOGRAM ═══
    html += `<div class="chart-row">
        <div class="chart-box"><h4>Entry Price Distribution: Sharky vs You</h4><canvas id="price-dist-chart"></canvas></div>
        <div class="chart-box"><h4>ROI% if Correct (Delta to $1.00 Strike)</h4><canvas id="roi-dist-chart"></canvas></div>
    </div>`;

    // ═══ SHARED MARKETS: HEAD-TO-HEAD PRICE COMPARISON ═══
    html += `<div class="card">
        <h3>Head-to-Head: Price Comparison on Shared Markets</h3>
        <p class="card-sub">For markets you both traded, who got the better price?</p>
        <div id="h2h-verdict"></div>
        <div class="chart-row" style="margin-bottom:0;">
            <div class="chart-box"><h4>Price Difference per Shared Market (Sharky - You)</h4><canvas id="h2h-scatter"></canvas></div>
            <div class="chart-box"><h4>Entry Price: Sharky vs You per Market</h4><canvas id="h2h-compare"></canvas></div>
        </div>
    </div>`;

    // ═══ PRICE BUCKETS ANALYSIS ═══
    html += `<div class="card">
        <h3>Price Bucket Analysis: Where Does Each Trader Operate?</h3>
        <p class="card-sub">Which price ranges (implied probability) does each trader prefer?</p>
        <div class="side-by-side" id="bucket-stats"></div>
        <div class="chart-row" style="margin-bottom:0;">
            <div class="chart-box full-w"><h4>Trade Count by Price Bucket</h4><canvas id="bucket-chart"></canvas></div>
        </div>
    </div>`;

    // ═══ DOES SHARKY HAVE A MIN DELTA? ═══
    html += `<div class="card">
        <h3>Does Sharky Have a Minimum Price Delta Threshold?</h3>
        <p class="card-sub">If Sharky only enters when price ≤ X, we'd see a ceiling in his entry prices.</p>
        <div id="delta-verdict"></div>
        <div class="chart-row" style="margin-bottom:0;">
            <div class="chart-box"><h4>Sharky: Entry Price Over Time</h4><canvas id="sh-price-time"></canvas></div>
            <div class="chart-box"><h4>You: Entry Price Over Time</h4><canvas id="me-price-time"></canvas></div>
        </div>
    </div>`;

    // ═══ DETAIL TABLE ═══
    html += `<div class="card">
        <h3>All Trades Detail</h3>
        <div class="filter-bar">
            <label>Trader</label><select id="who-filter" onchange="filterTable()"><option value="all">All</option><option value="Sharky">Sharky</option><option value="Me">Me</option></select>
            <label>Show</label><select id="shared-filter" onchange="filterTable()"><option value="all">All Markets</option><option value="shared">Shared Only</option></select>
            <label>Sort</label><select id="sort-filter" onchange="filterTable()"><option value="price-asc">Price ↑ (cheapest first)</option><option value="price-desc">Price ↓</option><option value="roi-desc">ROI% ↓</option><option value="time-desc">Newest first</option></select>
        </div>
        <div id="detail-table" style="max-height:600px; overflow-y:auto;"></div>
    </div>`;

    // ═══ BOT OPTIMIZATION ═══
    html += `<div class="card">
        <h3>Bot Optimization Recommendations</h3>
        <div id="bot-recs"></div>
    </div>`;

    el.innerHTML = html;
    el.style.display = 'block';
    document.getElementById('fetch-date').textContent = new Date().toLocaleString();

    // Store for filtering
    window._allTrades = trades;
    window._sharedSlugs = sharedSlugs;

    renderPriceDistChart(shTrades, meTrades);
    renderROIDistChart(shTrades, meTrades);
    renderH2H(trades, sharedSlugs);
    renderBuckets(shTrades, meTrades);
    renderDeltaThreshold(shTrades, meTrades);
    filterTable();
    renderBotRecs(shTrades, meTrades, sharedSlugs, trades);
}

function renderPriceDistChart(sh, me) {
    const bins = [];
    for (let i = 0; i < 20; i++) bins.push({ lo: i*0.05, hi: (i+1)*0.05, sh: 0, me: 0 });
    sh.forEach(t => { const b = Math.min(Math.floor(t.price / 0.05), 19); bins[b].sh++; });
    me.forEach(t => { const b = Math.min(Math.floor(t.price / 0.05), 19); bins[b].me++; });

    new Chart(document.getElementById('price-dist-chart'), {
        type: 'bar',
        data: {
            labels: bins.map(b => `$${b.lo.toFixed(2)}-${b.hi.toFixed(2)}`),
            datasets: [
                { label: 'Sharky', data: bins.map(b => b.sh), backgroundColor: 'rgba(240,136,62,0.6)', borderColor: '#f0883e', borderWidth: 1 },
                { label: 'Me', data: bins.map(b => b.me), backgroundColor: 'rgba(88,166,255,0.6)', borderColor: '#58a6ff', borderWidth: 1 }
            ]
        },
        options: {
            responsive: true, plugins: { legend: { labels: { color: '#8b949e' } } },
            scales: {
                x: { ticks: { color: '#8b949e', maxRotation: 45, font: { size: 10 } }, grid: { color: 'rgba(48,54,61,0.3)' } },
                y: { ticks: { color: '#8b949e' }, grid: { color: 'rgba(48,54,61,0.3)' }, title: { display: true, text: 'Trade Count', color: '#8b949e' } }
            }
        }
    });
}

function renderROIDistChart(sh, me) {
    const maxROI = 200;
    const step = 10;
    const bins = [];
    for (let i = 0; i < maxROI / step; i++) bins.push({ lo: i*step, hi: (i+1)*step, sh: 0, me: 0 });
    bins.push({ lo: maxROI, hi: 9999, sh: 0, me: 0 }); // overflow
    sh.forEach(t => { const b = Math.min(Math.floor(t.deltaPct / step), bins.length - 1); bins[b].sh++; });
    me.forEach(t => { const b = Math.min(Math.floor(t.deltaPct / step), bins.length - 1); bins[b].me++; });

    new Chart(document.getElementById('roi-dist-chart'), {
        type: 'bar',
        data: {
            labels: bins.map((b,i) => i === bins.length-1 ? `${maxROI}%+` : `${b.lo}-${b.hi}%`),
            datasets: [
                { label: 'Sharky', data: bins.map(b => b.sh), backgroundColor: 'rgba(240,136,62,0.6)', borderColor: '#f0883e', borderWidth: 1 },
                { label: 'Me', data: bins.map(b => b.me), backgroundColor: 'rgba(88,166,255,0.6)', borderColor: '#58a6ff', borderWidth: 1 }
            ]
        },
        options: {
            responsive: true, plugins: { legend: { labels: { color: '#8b949e' } } },
            scales: {
                x: { ticks: { color: '#8b949e', maxRotation: 45, font: { size: 10 } }, grid: { color: 'rgba(48,54,61,0.3)' } },
                y: { ticks: { color: '#8b949e' }, grid: { color: 'rgba(48,54,61,0.3)' }, title: { display: true, text: 'Trade Count', color: '#8b949e' } }
            }
        }
    });
}

function renderH2H(trades, sharedSlugs) {
    // For each shared slug, get avg price for each trader
    const slugData = {};
    trades.forEach(t => {
        if (!sharedSlugs.has(t.slug)) return;
        if (!slugData[t.slug]) slugData[t.slug] = { sh: [], me: [], title: t.title };
        if (t.wallet === 'Sharky') slugData[t.slug].sh.push(t.price);
        else slugData[t.slug].me.push(t.price);
    });

    const pairs = Object.entries(slugData)
        .filter(([_, v]) => v.sh.length && v.me.length)
        .map(([slug, v]) => ({
            slug,
            title: v.title,
            shAvg: avg(v.sh),
            meAvg: avg(v.me),
            diff: avg(v.sh) - avg(v.me) // negative = Sharky cheaper
        }))
        .sort((a, b) => a.diff - b.diff);

    if (!pairs.length) {
        document.getElementById('h2h-verdict').innerHTML = '<div class="verdict-box"><div class="verdict-title" style="color:var(--text-muted)">No shared markets found to compare.</div></div>';
        return;
    }

    // Verdict
    const shCheaper = pairs.filter(p => p.diff < -0.001).length;
    const meCheaper = pairs.filter(p => p.diff > 0.001).length;
    const tied = pairs.length - shCheaper - meCheaper;
    const avgDiff = avg(pairs.map(p => p.diff));

    let verdictColor, verdictTitle;
    if (shCheaper > meCheaper) {
        verdictColor = '#f0883e';
        verdictTitle = `Sharky gets better prices in ${shCheaper}/${pairs.length} shared markets (avg $${Math.abs(avgDiff).toFixed(4)} cheaper)`;
    } else if (meCheaper > shCheaper) {
        verdictColor = '#58a6ff';
        verdictTitle = `You get better prices in ${meCheaper}/${pairs.length} shared markets (avg $${Math.abs(avgDiff).toFixed(4)} cheaper)`;
    } else {
        verdictColor = '#e3b341';
        verdictTitle = `Prices are roughly equal across ${pairs.length} shared markets`;
    }

    document.getElementById('h2h-verdict').innerHTML = `
        <div class="verdict-box">
            <div class="verdict-title" style="color:${verdictColor}">${verdictTitle}</div>
            <div class="verdict-body">
                Sharky cheaper: ${shCheaper} markets | You cheaper: ${meCheaper} markets | Tied: ${tied}<br>
                Average price difference: <b>$${avgDiff.toFixed(4)}</b> (negative = Sharky cheaper)
            </div>
        </div>`;

    // Scatter: diff per market
    const labels = pairs.map((p, i) => `Market ${i + 1}`);
    new Chart(document.getElementById('h2h-scatter'), {
        type: 'bar',
        data: {
            labels,
            datasets: [{

        { label: '$0.85-0.90', lo: 0.85, hi: 0.90, desc: '11-18% ROI' },
        { label: '$0.90-0.93', lo: 0.90, hi: 0.93, desc: '7.5-11% ROI' },

        if (b.meCount) statsHTML += `<div class="stat-line">${b.label} <span class="stat-val">${b.meCount} trades</span> (${fmtUSD(b.meUSDC)}) — ${b.desc}</div>`;

function renderDeltaThreshold(sh, me) {
    // Plot price over time for each
    const shSorted = [...sh].sort((a, b) => a.timestamp - b.timestamp);
    const meSorted = [...me].sort((a, b) => a.timestamp - b.timestamp);

    // Sharky price ceiling detection
    const shP95 = sh.length ? [...sh.map(t => t.price)].sort((a, b) => a - b)[Math.floor(sh.length * 0.95)] : 0;
    const shP99 = sh.length ? [...sh.map(t => t.price)].sort((a, b) => a - b)[Math.floor(sh.length * 0.99)] : 0;
    const shMax = sh.length ? Math.max(...sh.map(t => t.price)) : 0;
    const meP95 = me.length ? [...me.map(t => t.price)].sort((a, b) => a - b)[Math.floor(me.length * 0.95)] : 0;
    const meMax = me.length ? Math.max(...me.map(t => t.price)) : 0;

    // Check if Sharky has a tight ceiling
    const shStd = sh.length > 1 ? Math.sqrt(sh.map(t => Math.pow(t.price - avg(sh.map(x => x.price)), 2)).reduce((a, b) => a + b) / sh.length) : 0;
    const meStd = me.length > 1 ? Math.sqrt(me.map(t => Math.pow(t.price - avg(me.map(x => x.price)), 2)).reduce((a, b) => a + b) / me.length) : 0;

    const shAbove95 = sh.filter(t => t.price > 0.95).length;
    const meAbove95 = me.filter(t => t.price > 0.95).length;
    const shPctAbove95 = pct(shAbove95, sh.length);
    const mePctAbove95 = pct(meAbove95, me.length);

    let verdictHTML = '';
    if (parseFloat(shPctAbove95) < 10 && parseFloat(mePctAbove95) > 30) {
        verdictHTML = `<div class="verdict-box">
            <div class="verdict-title" style="color:#f0883e">YES — Sharky appears to have a price ceiling around $${shP95.toFixed(3)}</div>
            <div class="verdict-body">
                Only ${shPctAbove95}% of Sharky's trades are above $0.95, compared to ${mePctAbove95}% of yours.<br>
                Sharky's price range: $${Math.min(...sh.map(t=>t.price)).toFixed(3)} – $${shMax.toFixed(3)} (P95: $${shP95.toFixed(3)}, StdDev: $${shStd.toFixed(3)})<br>
                Your price range: $${Math.min(...me.map(t=>t.price)).toFixed(3)} – $${meMax.toFixed(3)} (P95: $${meP95.toFixed(3)}, StdDev: $${meStd.toFixed(3)})<br><br>
                <b>Interpretation:</b> Sharky likely has a rule like "only enter if price ≤ $${shP95.toFixed(2)}" which ensures a minimum ${((1/shP95 - 1)*100).toFixed(0)}%+ ROI.
                You're entering at higher prices (lower ROI), which means you need a higher win rate to be profitable.
            </div>
        </div>`;
    } else if (parseFloat(shPctAbove95) < 20) {
        verdictHTML = `<div class="verdict-box">
            <div class="verdict-title" style="color:#e3b341">LIKELY — Sharky tends to avoid high prices (P95 = $${shP95.toFixed(3)})</div>
            <div class="verdict-body">
                ${shPctAbove95}% of Sharky's trades are above $0.95, vs ${mePctAbove95}% of yours.<br>
                Sharky's P95 ceiling: $${shP95.toFixed(3)} | Your P95: $${meP95.toFixed(3)}<br>
                Sharky StdDev: $${shStd.toFixed(3)} | Your StdDev: $${meStd.toFixed(3)}<br><br>
                <b>Interpretation:</b> Sharky appears to set limit orders at prices that guarantee meaningful ROI.
                He's more selective about entry price than you.
            </div>
        </div>`;
    } else {
        verdictHTML = `<div class="verdict-box">
            <div class="verdict-title" style="color:#58a6ff">UNCLEAR — Both traders operate at similar price levels</div>
            <div class="verdict-body">
                Sharky above $0.95: ${shPctAbove95}% | You above $0.95: ${mePctAbove95}%<br>
                Both price distributions are similar. The edge likely comes from timing, not price selection.
            </div>
        </div>`;
    }
    document.getElementById('delta-verdict').innerHTML = verdictHTML;

    // Time series charts
    function makeTimeChart(canvasId, data, color, label) {
        new Chart(document.getElementById(canvasId), {
            type: 'scatter',
            data: {
                datasets: [{
                    label,
                    data: data.map(t => ({ x: t.timestamp * 1000, y: t.price })),
                    backgroundColor: color + '80',
                    borderColor: color,
                    pointRadius: 3,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: (items) => {
                                const d = new Date(items[0].parsed.x);
                                return d.toLocaleString();
                            },
                            label: (item) => {
                                const idx = item.dataIndex;
                                const t = data[idx];
                                return [`Price: $${t.price.toFixed(3)}`, `ROI: ${t.deltaPct.toFixed(1)}%`, t.title.substring(0, 50)];
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        ticks: { color: '#8b949e', callback: v => { const d=new Date(v); return `${d.getMonth()+1}/${d.getDate()}`; } },
                        grid: { color: 'rgba(48,54,61,0.2)' }
                    },
                    y: {
                        min: 0.4, max: 1.0,
                        ticks: { color: '#8b949e', callback: v => `$${v.toFixed(2)}` },
                        grid: { color: ctx => ctx.tick.value === 0.95 ? 'rgba(248,81,73,0.5)' : 'rgba(48,54,61,0.3)', lineWidth: ctx => ctx.tick.value === 0.95 ? 2 : 1 },
                        title: { display: true, text: 'Entry Price', color: '#8b949e' }
                    }
                }
            }
        });
    }
    makeTimeChart('sh-price-time', shSorted, '#f0883e', 'Sharky');
    makeTimeChart('me-price-time', meSorted, '#58a6ff', 'Me');
}

function renderBotRecs(sh, me, sharedSlugs, allTrades) {
    const shPrices = sh.map(t => t.price);
    const mePrices = me.map(t => t.price);
    const shMed = med(shPrices);
    const meMed = med(mePrices);
    const shP95 = sh.length ? [...shPrices].sort((a,b) => a-b)[Math.floor(sh.length * 0.95)] : 0;

    // Compare shared markets
    const slugData = {};
    allTrades.forEach(t => {
        if (!sharedSlugs.has(t.slug)) return;
        if (!slugData[t.slug]) slugData[t.slug] = { sh: [], me: [] };
        if (t.wallet === 'Sharky') slugData[t.slug].sh.push(t.price);
        else slugData[t.slug].me.push(t.price);
    });
    const pairs = Object.values(slugData).filter(v => v.sh.length && v.me.length);
    const avgPriceDiff = pairs.length ? avg(pairs.map(v => avg(v.me) - avg(v.sh))) : 0;

    let recs = `<div class="verdict-box">
        <div class="verdict-title" style="color:var(--positive)">Strategy Recommendations for Your Bot</div>
        <div class="verdict-body">
            <b>1. Switch from GTD to GTC Limit Orders</b><br>
            Sharky uses resting GTC limit orders at target prices. Your GTD orders execute immediately at whatever price is available 30s before close.
            By placing GTC limit orders, your order sits in the book and only fills if someone takes the other side at YOUR price — not the market price.<br><br>

            <b>2. Set a Maximum Entry Price</b><br>
            Sharky's P95 entry price is <b>$${shP95.toFixed(3)}</b> — meaning 95% of his trades are at or below this price.
            Your median entry is <b>$${meMed.toFixed(3)}</b> vs his <b>$${shMed.toFixed(3)}</b>.
            ${avgPriceDiff > 0 ? `On shared markets, you pay an average of <b>$${avgPriceDiff.toFixed(4)} more</b> per share.` : ''}
            Consider adding a rule: <code>if (currentPrice > ${shP95.toFixed(2)}) skip()</code><br><br>

            <b>3. Place Orders Earlier at Better Prices</b><br>
            Instead of rushing in 30s before close, place your GTC limit order at your target price well in advance (minutes to hours before close).
            If the market moves to your price, you get filled. If not, you skip the trade — which is fine because the ROI wasn't there.<br><br>

            <b>4. Price Over Timing</b><br>
            The core lesson: Sharky's edge is NOT about timing (settling after close) — it's about PRICE DISCIPLINE.
            He only enters at prices that give him meaningful ROI, and he uses GTC orders to wait for those prices patiently.
            Your bot should prioritize getting the right price over getting into every market.
        </div>
    </div>`;
    document.getElementById('bot-recs').innerHTML = recs;
}

function filterTable() {
    const who = document.getElementById('who-filter').value;
    const shared = document.getElementById('shared-filter').value;
    const sort = document.getElementById('sort-filter').value;

    let data = window._allTrades || [];
    if (who !== 'all') data = data.filter(t => t.wallet === who);
    if (shared === 'shared') data = data.filter(t => window._sharedSlugs.has(t.slug));

    if (sort === 'price-asc') data = [...data].sort((a, b) => a.price - b.price);
    else if (sort === 'price-desc') data = [...data].sort((a, b) => b.price - a.price);
    else if (sort === 'roi-desc') data = [...data].sort((a, b) => b.deltaPct - a.deltaPct);
    else data = [...data].sort((a, b) => b.timestamp - a.timestamp);

    let h = '<table><thead><tr><th>Who</th><th>Price</th><th>ROI% if Correct</th><th>USDC Size</th><th>Side</th><th>Outcome</th><th>Market</th><th>Time (Local)</th></tr></thead><tbody>';
    data.slice(0, 300).forEach(t => {
        const who = t.wallet === 'Me' ? '<span class="tag-me">Me</span>' : '<span class="tag-sh">Sh</span>';
        const roiColor = t.deltaPct > 20 ? 'var(--positive)' : t.deltaPct > 10 ? '#e3b341' : 'var(--negative)';
        h += `<tr>
            <td>${who}</td>
            <td><b>$${t.price.toFixed(3)}</b></td>
            <td style="color:${roiColor};font-weight:700">${t.deltaPct.toFixed(1)}%</td>
            <td>${fmtUSD(t.usdc)}</td>
            <td>${t.side}</td>
            <td>${t.outcome}</td>
            <td class="td-market">${esc(t.title)}</td>
            <td>${t.datetime}</td>
        </tr>`;
    });
    if (data.length > 300) h += `<tr><td colspan="8" style="color:var(--text-muted);text-align:center;">...and ${data.length-300} more</td></tr>`;
    h += '</tbody></table>';
    document.getElementById('detail-table').innerHTML = h;
}

// ════════ MAIN ════════
async function main() {
    let all = [];
    let step = 0;
    for (const [label, addr] of Object.entries(WALLETS)) {
        const raw = await fetchAll(label, addr);
        raw.forEach(t => t._wallet = label);
        all = all.concat(raw);
        step++;
        prog(Math.round(step / Object.keys(WALLETS).length * 90));
    }
    log(`Total: ${all.length} trades`, 'log-ok');
    prog(100);

    if (!all.length) {
        document.getElementById('load-title').textContent = 'No trades loaded';
        return;
    }

    document.getElementById('loading').style.display = 'none';
    buildAnalysis(all);
}

main();
